<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周报自动化系统 — 计划外任务</title>
  <link rel="stylesheet" href="./shared/style.css" />
</head>
<body>
  <nav id="app-nav"></nav>

  <h1>计划外任务（类型D）</h1>
  <p>临时产生，多数一两周内结束；无排期，仅记录实际发生时间。可"转正"升级为类型A/B/C。</p>

  <section>
    <h2>新增</h2>
    <form id="create-form" class="inline-form">
      <label>编号 <input type="number" name="level1_number" required min="1" style="width:5em" /></label>
      <input type="text" name="title" placeholder="任务标题" required style="min-width:220px" />
      <label>开始日期 <input type="date" name="actual_start" required /></label>
      <input type="text" name="description" placeholder="说明(可选)" style="min-width:220px" />
      <button type="submit">新增</button>
    </form>
    <p id="create-result" class="status"></p>
  </section>

  <section>
    <h2>全部记录</h2>
    <table>
      <thead>
        <tr><th>编号</th><th>标题</th><th>开始</th><th>结束</th><th>状态</th><th>转正情况</th><th>操作</th></tr>
      </thead>
      <tbody id="tasks-tbody"></tbody>
    </table>
  </section>

  <script type="module" src="./ad-hoc-tasks.js"></script>
</body>
</html>
