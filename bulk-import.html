<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周报自动化系统 — 批量导入</title>
  <link rel="stylesheet" href="./shared/style.css" />
</head>
<body class="wide-page">
  <nav id="app-nav"></nav>

  <h1>批量导入</h1>

  <section>
    <h2>第一步：下载模板</h2>
    <button type="button" id="download-template-btn">下载空白模板</button>
  </section>

  <section>
    <h2>第二步：上传并校验</h2>
    <input type="file" id="file-input" accept=".xlsx" />
    <p id="parse-status" class="status"></p>
    <div id="validation-errors"></div>
  </section>

  <section id="preview-section" hidden>
    <h2>第三步：预览</h2>
    <p id="preview-summary"></p>
    <div class="table-scroll">
      <table>
        <thead>
          <tr><th>项目编号</th><th>类型</th><th>项目标题</th><th>动作</th></tr>
        </thead>
        <tbody id="preview-projects-tbody"></tbody>
      </table>
    </div>
    <div class="table-scroll" style="margin-top:12px">
      <table>
        <thead>
          <tr><th>项目编号</th><th>二级</th><th>三级</th><th>任务标题</th><th>模块</th><th>责任人</th><th>最终交付物</th><th>最终计划完成时间</th></tr>
        </thead>
        <tbody id="preview-tasks-tbody"></tbody>
      </table>
    </div>
    <button type="button" id="import-btn" style="margin-top:12px">开始导入</button>
  </section>

  <section id="result-section" hidden>
    <h2>导入结果</h2>
    <p id="import-summary" class="status"></p>
    <div class="table-scroll">
      <table>
        <thead>
          <tr><th>类型</th><th>内容</th><th>结果</th></tr>
        </thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>
  </section>

  <script type="module" src="./bulk-import.js"></script>
</body>
</html>
