<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周报自动化系统 — 截止日期项目详情</title>
  <link rel="stylesheet" href="./shared/style.css" />
</head>
<body>
  <nav id="app-nav"></nav>

  <p><a href="deadline-projects.html">← 返回列表</a></p>
  <h1 id="project-title">加载中...</h1>
  <p id="delay-banner"></p>

  <section>
    <h2>项目信息</h2>
    <form id="project-form" class="inline-form">
      <label>截止日期 <input type="date" name="deadline_date" required /></label>
      <label>状态
        <select name="status">
          <option value="active">active</option>
          <option value="completed">completed</option>
        </select>
      </label>
      <input type="text" name="target_deliverable" placeholder="最终目标交付物" />
      <button type="submit">保存</button>
    </form>
    <p id="project-save-result" class="status"></p>
  </section>

  <section>
    <h2>新增节点(milestone)</h2>
    <p>编号(WBS二级/三级)一旦分配不再更改。deadline倒排后新增节点时手动填planned_date即可。</p>
    <form id="milestone-form" class="inline-form">
      <label>二级编号 <input type="number" name="wbs_level2_number" required min="1" style="width:5em" /></label>
      <label>三级编号(可选) <input type="number" name="wbs_level3_number" min="1" style="width:5em" /></label>
      <input type="text" name="title" placeholder="节点标题" required style="min-width:220px" />
      <label>计划日期 <input type="date" name="planned_date" required /></label>
      <button type="submit">新增</button>
    </form>
    <p id="milestone-create-result" class="status"></p>
  </section>

  <section>
    <h2>节点列表（倒排顺序）</h2>
    <table>
      <thead>
        <tr><th>编号</th><th>标题</th><th>计划日期</th><th>实际日期</th><th>状态</th></tr>
      </thead>
      <tbody id="milestones-tbody"></tbody>
    </table>
  </section>

  <script type="module" src="./deadline-project-detail.js"></script>
</body>
</html>
