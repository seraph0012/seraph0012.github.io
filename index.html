<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周报自动化系统 — 制作周报</title>
  <link rel="stylesheet" href="./shared/style.css" />
</head>
<body class="wide-page">
  <nav id="app-nav"></nav>

  <h1>制作周报</h1>

  <section>
    <h2>目标例会周</h2>
    <form class="inline-form" onsubmit="return false">
      <select id="week-select"></select>
    </form>
    <p id="week-info" class="status"></p>
  </section>

  <section>
    <div id="task-create-root"></div>
  </section>

  <section>
    <h2>① 上周总结</h2>
    <div id="summary-root"></div>
  </section>

  <section>
    <h2>② 本周计划</h2>
    <div id="plan-root"></div>
  </section>

  <section>
    <h2>③ 未启动/中止工作</h2>
    <div id="stopped-root"></div>
  </section>

  <section>
    <h2>④ 生成PPT</h2>
    <button type="button" id="preview-ppt-btn" class="secondary">预览</button>
    <button type="button" id="generate-ppt-btn">生成并下载PPT</button>
    <p id="generate-result" class="status"></p>
    <div id="preview-root"></div>
  </section>

  <script type="module" src="./index.js"></script>
</body>
</html>
