<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周报自动化系统 — 模块管理</title>
  <link rel="stylesheet" href="./shared/style.css" />
</head>
<body>
  <nav id="app-nav"></nav>

  <h1>模块管理（modules）</h1>
  <p>编制指南要求"任务模块名称需统一规范"，这里维护一份统一的模块名单，供其他表单下拉选择，避免同义词漂移（如"科研项目"/"科研"混用）。</p>

  <section>
    <h2>新增模块</h2>
    <form id="create-form" class="inline-form">
      <input type="text" name="name" placeholder="模块名称，如 科研项目" required />
      <button type="submit">新增</button>
    </form>
    <p id="create-result" class="status"></p>
  </section>

  <section>
    <h2>全部模块</h2>
    <table>
      <thead><tr><th>名称</th><th></th></tr></thead>
      <tbody id="modules-tbody"></tbody>
    </table>
  </section>

  <script type="module" src="./modules.js"></script>
</body>
</html>
