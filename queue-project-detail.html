<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周报自动化系统 — 顺序队列项目详情</title>
  <link rel="stylesheet" href="./shared/style.css" />
</head>
<body>
  <nav id="app-nav"></nav>

  <p><a href="queue-projects.html">← 返回列表</a></p>
  <h1 id="project-title">加载中...</h1>

  <section>
    <h2>项目信息</h2>
    <form id="project-form" class="inline-form">
      <label>分类 <input type="text" name="category" /></label>
      <label>状态
        <select name="status">
          <option value="active">active</option>
          <option value="paused">paused</option>
          <option value="completed">completed</option>
        </select>
      </label>
      <button type="submit">保存</button>
    </form>
    <p id="project-save-result" class="status"></p>
  </section>

  <section>
    <h2>新增子任务</h2>
    <p>编号(WBS二级/三级)一旦分配不再更改；执行顺序可随时用下方"上移/下移"调整，与编号无关。</p>
    <form id="task-form" class="inline-form">
      <label>二级编号 <input type="number" name="wbs_level2_number" required min="1" style="width:5em" /></label>
      <label>三级编号(可选) <input type="number" name="wbs_level3_number" min="1" style="width:5em" /></label>
      <input type="text" name="title" placeholder="任务标题" required style="min-width:260px" />
      <input type="text" name="target_deliverable" placeholder="总体交付材料(可选)" />
      <button type="submit">新增</button>
    </form>
    <p id="task-create-result" class="status"></p>
  </section>

  <section>
    <h2>子任务队列（按执行顺序）</h2>
    <table>
      <thead>
        <tr><th>编号</th><th>标题</th><th>交付材料</th><th>状态</th><th>指针</th><th>顺序</th></tr>
      </thead>
      <tbody id="tasks-tbody"></tbody>
    </table>
  </section>

  <script type="module" src="./queue-project-detail.js"></script>
</body>
</html>
