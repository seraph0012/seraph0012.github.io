<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周报自动化系统 — 顺序队列任务</title>
  <link rel="stylesheet" href="./shared/style.css" />
</head>
<body>
  <nav id="app-nav"></nav>

  <h1>顺序队列任务（类型A）</h1>
  <p>长期、无硬性日期，线性推进：有序子任务列表 + 当前进度指针，做完一项进入下一项。</p>

  <section>
    <h2>新建项目</h2>
    <form id="create-form" class="inline-form">
      <input type="text" name="title" placeholder="项目名" required style="min-width:260px" />
      <input type="text" name="category" placeholder="分类（可选，如 科研项目）" />
      <button type="submit">新建</button>
    </form>
    <p id="create-result" class="status"></p>
  </section>

  <section>
    <h2>全部项目</h2>
    <table>
      <thead>
        <tr><th>编号</th><th>项目名</th><th>分类</th><th>状态</th><th>当前进行到</th><th></th></tr>
      </thead>
      <tbody id="projects-tbody"></tbody>
    </table>
  </section>

  <script type="module" src="./queue-projects.js"></script>
</body>
</html>
