<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周报自动化系统 — 循环任务</title>
  <link rel="stylesheet" href="./shared/style.css" />
</head>
<body>
  <nav id="app-nav"></nav>

  <h1>循环任务（类型C）</h1>
  <p>三级编号体系：一级固定不变，二级=相对月数（跳月后恢复只+1，不按实际跨月跳跃），三级=该月内第几次执行（跳过的顺延递补，不留空号）。</p>

  <section>
    <h2>新建模板</h2>
    <form id="create-form" class="inline-form">
      <input type="text" name="title" placeholder="任务标题" required style="min-width:220px" />
      <select name="module_id"><option value="">（模块可选）</option></select>
      <input type="text" name="owner" placeholder="责任人(可选)" />
      <select name="frequency">
        <option value="weekly">weekly</option>
        <option value="monthly">monthly</option>
        <option value="custom">custom</option>
      </select>
      <label>起始例会周 <select name="start_meeting_week_id" required></select></label>
      <button type="submit">新建</button>
    </form>
    <p id="create-result" class="status"></p>
  </section>

  <section>
    <h2>模板列表</h2>
    <table>
      <thead><tr><th>编号</th><th>标题</th><th>频率</th><th>状态</th><th></th></tr></thead>
      <tbody id="templates-tbody"></tbody>
    </table>
  </section>

  <section id="instances-section" hidden>
    <h2 id="instances-title">实例</h2>
    <button type="button" id="generate-next-btn">生成下一个实例</button>
    <p id="generate-result" class="status"></p>
    <table>
      <thead><tr><th>编号</th><th>对应例会周</th><th>应完成日期</th><th>实际完成</th><th>状态</th><th>用时(计划/实际)</th></tr></thead>
      <tbody id="instances-tbody"></tbody>
    </table>
  </section>

  <script type="module" src="./recurring-tasks.js"></script>
</body>
</html>
