<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周报自动化系统 — 任务管理</title>
  <link rel="stylesheet" href="./shared/style.css" />
</head>
<body class="wide-page">
  <nav id="app-nav"></nav>

  <h1>任务管理</h1>

  <section>
    <h2>新建任务</h2>
    <form id="create-form" class="inline-form">
      <label>归属 <select id="owner-select"></select></label>

      <span id="new-project-fields" hidden>
        <label>编号 <input type="number" id="new-project-number" min="1" style="width:5em" /></label>
        <span id="new-project-title-wrap">
          <input type="text" id="new-project-title" placeholder="项目/任务标题" style="min-width:200px" />
        </span>
        <span id="new-project-extra-wrap">
          <input type="text" id="new-project-category" placeholder="分类(可选)" />
          <label>截止日期 <input type="date" id="new-project-deadline" /></label>
          <input type="text" id="new-project-deliverable" placeholder="项目最终交付物(可选)" />
        </span>
      </span>

      <span id="leaf-fields" hidden>
        <label>二级编号 <select id="wbs-level2-select"></select></label>
        <label id="wbs-level2-new-wrap" hidden>新二级编号 <input type="number" id="wbs-level2-new" min="1" style="width:5em" /></label>
        <label id="wbs-level2-title-wrap" hidden>二级标题 <input type="text" id="wbs-level2-title" placeholder="如：制作方案" style="min-width:160px" /></label>
        <label>三级编号 <input type="number" id="wbs-level3" min="1" placeholder="留空=无三级" style="width:6em" /></label>
        <input type="text" id="leaf-title" placeholder="任务标题" style="min-width:200px" />
        <label>模块 <select id="leaf-module"></select></label>
        <label>责任人 <select id="leaf-owner"></select></label>
        <input type="text" id="leaf-deliverable" placeholder="最终目标交付物" style="min-width:200px" />
        <label>预计开始日期 <input type="date" id="leaf-start-date" /></label>
        <label>最终计划完成时间 <input type="date" id="leaf-completion-date" /></label>
      </span>

      <span id="recurring-new-fields" hidden>
        <label>模块 <select id="recurring-module"></select></label>
        <label>责任人 <select id="recurring-owner-select"></select></label>
        <select id="recurring-frequency">
          <option value="weekly">weekly</option>
          <option value="monthly">monthly</option>
          <option value="custom">custom</option>
        </select>
        <label>动词前缀 <input type="text" id="recurring-title-verb" placeholder="如：制作" style="width:100px" /></label>
        <label>名词部分 <input type="text" id="recurring-title-noun" placeholder="如：周例会PPT" style="min-width:180px" /></label>
        <label>第一次的例会周 <select id="recurring-first-week"></select></label>
      </span>

      <span id="recurring-instance-fields" hidden>
        <span id="recurring-instance-preview" class="status"></span>
      </span>

      <button type="submit" id="create-submit-btn">新建</button>
    </form>
    <p id="create-result" class="status"></p>
  </section>

  <section>
    <h2>全部任务</h2>
    <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>编号</th>
          <th>类型</th>
          <th>标题</th>
          <th>模块</th>
          <th>责任人</th>
          <th>最终交付物</th>
          <th>最终计划完成时间</th>
          <th>实际完成</th>
          <th>状态</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tasks-tbody"></tbody>
    </table>
    </div>
  </section>

  <script type="module" src="./tasks.js"></script>
</body>
</html>
